<div class="container">

  <div class="search-bar-wrapper">
  <form (ngSubmit)="onSubmit()" style="max-width:600px; margin:0 auto;">

    <div class="input-group input-group-lg search-input-group">

      <input
        type="text"
        class="form-control"
        [(ngModel)]="title"
        name="title"
        placeholder="Search for a movie..."
        required>

      <button type="submit" class="btn btn-danger"> Search </button>
      <button type="button" class="btn btn-outline-light" (click)="title=''; movieService.resetSearch()">Clear</button>

    </div>

  </form>
  </div>

</div>
